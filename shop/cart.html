<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — ShopBD</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <span>📞 09678-000-000</span>
    <a href="index.html">← Continue Shopping</a>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Shop<span>BD</span></a>
    <form class="search-wrap" id="searchForm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="searchInput" placeholder="Search products…">
    </form>
    <div class="header-actions">
      <a href="cart.html" class="icon-btn" aria-label="Cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" data-cart-count style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page-main">
  <h1 class="page-title">Shopping Cart</h1>

  <div class="empty-cart" id="cartEmpty" style="display:none">
    <div style="font-size:64px">🛒</div>
    <p>Your cart is empty</p>
    <a href="index.html" class="btn-add" style="display:inline-block;width:auto;padding:12px 28px">Start Shopping</a>
  </div>

  <div class="cart-layout" id="cartContent" style="display:none">
    <div class="cart-table" id="cartRows"></div>
    <aside class="cart-summary">
      <h3>Order Summary</h3>
      <div class="summary-line"><span>Subtotal</span><span id="cartSubtotal">৳0</span></div>
      <div class="summary-line"><span>Delivery</span><span id="cartDelivery">৳0</span></div>
      <div class="summary-line total"><span>Total</span><span id="cartTotal">৳0</span></div>
      <button type="button" class="btn-checkout" onclick="alert('Checkout demo — connect bKash/COD backend here.')">Place Order (COD)</button>
      <p style="font-size:12px;color:var(--text3);margin-top:12px;text-align:center">Pay with bKash, Nagad, or card at checkout</p>
    </aside>
  </div>
</main>

<footer class="site-footer" style="margin-top:48px">
  <div class="footer-bottom" style="border:none;padding:0">© 2026 ShopBD</div>
</footer>

<div id="toast"></div>
<script src="js/products.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
