<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote List — Amptek Engineering</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <span>📞 <span data-company-phone></span></span>
    <a href="index.html" data-en="← Continue" data-bn="← ফিরে যান">← Continue</a>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Amp<span>tek</span></a>
    <div class="header-actions" style="margin-left:auto">
      <div class="lang-toggle">
        <button type="button" class="lang-btn active" id="lbEn" onclick="setShopLang('en')">EN</button>
        <button type="button" class="lang-btn" id="lbBn" onclick="setShopLang('bn')">বাং</button>
      </div>
      <a href="cart.html" class="icon-btn">
        <span class="cart-count" data-cart-count style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page-main">
  <h1 class="page-title" data-en="Request a Quote" data-bn="কোটেশন অনুরোধ">Request a Quote</h1>

  <div class="empty-cart" id="cartEmpty" style="display:none">
    <div style="font-size:64px">📋</div>
    <p data-en="Your quote list is empty" data-bn="আপনার তালিকা খালি">Your quote list is empty</p>
    <a href="index.html" class="btn-add" style="display:inline-block;width:auto;padding:12px 28px" data-en="Browse Services" data-bn="সেবা দেখুন">Browse Services</a>
  </div>

  <div class="cart-layout" id="cartContent" style="display:none">
    <div class="cart-table" id="cartRows"></div>
    <aside class="cart-summary">
      <h3 data-en="Order Summary" data-bn="সারাংশ">Order Summary</h3>
      <div class="summary-line"><span data-en="Subtotal" data-bn="উপমোট">Subtotal</span><span id="cartSubtotal">—</span></div>
      <div class="summary-line"><span data-en="Delivery" data-bn="ডেলিভারি">Delivery</span><span id="cartDelivery">—</span></div>
      <div class="summary-line total"><span data-en="Total" data-bn="মোট">Total</span><span id="cartTotal">—</span></div>
      <button type="button" class="btn-checkout" onclick="window.location.href='contact.html'" data-en="Submit Quote Request" data-bn="কোটেশন পাঠান">Submit Quote Request</button>
      <p style="font-size:12px;color:var(--text3);margin-top:12px;text-align:center"><span data-en="We will call you at" data-bn="আমরা কল করব">We will call you at</span> <span data-company-phone></span></p>
    </aside>
  </div>
</main>

<footer class="site-footer" style="margin-top:48px">
  <div class="footer-bottom" style="border:none;padding:0">© 2026 Amptek Engineering</div>
</footer>

<div id="toast"></div>
<script src="js/company.js"></script>
<script src="js/i18n.js"></script>
<script src="js/products.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
