<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Amptek</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <a href="index.html" data-en="← Back to home" data-bn="← হোমে ফিরে যান">← Back to home</a>
    <span>📞 <span data-company-phone></span> · <span data-company-email></span></span>
    <a href="cart.html" data-en="Quote List" data-bn="কোটেশন তালিকা">Quote List</a>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Amp<span>tek</span><small>Engineering</small></a>
    <form class="search-wrap" id="searchForm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="searchInput" placeholder="Search products…">
    </form>
    <div class="header-actions">
      <div class="lang-toggle">
        <button type="button" class="lang-btn active" id="lbEn" onclick="setShopLang('en')">EN</button>
        <button type="button" class="lang-btn" id="lbBn" onclick="setShopLang('bn')">বাংলা</button>
      </div>
      <a href="cart.html" class="icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" data-cart-count style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page-main">
  <div class="product-detail" id="productDetail">
    <p>Loading…</p>
  </div>
</main>

<footer class="site-footer" style="margin-top:48px">
  <div class="footer-bottom" style="border:none">© 2026 Amptek</div>
</footer>

<div id="toast"></div>
<script src="js/company.js"></script>
<script src="js/i18n.js"></script>
<script src="js/products.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
