<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Amptek</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <a href="index.html">← Back to store</a>
    <span>📞 <a href="tel:01671113616" style="color:#fff">01671-113616</a></span>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Amp<span>tek</span></a>
    <div class="header-actions" style="margin-left:auto">
      <a href="cart.html" class="icon-btn" aria-label="Cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" data-cart-count style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page-main">
  <h1 class="page-title">Contact Amptek</h1>
  <div class="contact-layout" style="display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:900px">
    <div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">📞</div>
        <div>
          <div class="ci-label">Phone</div>
          <div class="ci-value"><a href="tel:01671113616">01671-113616</a></div>
          <div class="ci-sub">10 AM – 11 PM, 7 days a week</div>
        </div>
      </div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">✉️</div>
        <div>
          <div class="ci-label">Email</div>
          <div class="ci-value"><a href="mailto:nahidalam85@gmail.com">nahidalam85@gmail.com</a></div>
        </div>
      </div>
      <div class="ci-card">
        <div class="ci-icon">💬</div>
        <div>
          <div class="ci-label">WhatsApp</div>
          <div class="ci-value"><a href="https://wa.me/8801671113616" target="_blank" rel="noopener">Chat on WhatsApp</a></div>
        </div>
      </div>
    </div>
    <div class="cf-box">
      <h2 class="cf-title" style="font-family:var(--eng);font-size:20px;margin-bottom:16px">Send a message</h2>
      <form id="contactForm" onsubmit="event.preventDefault(); alert('Thank you! We will contact you soon.'); this.reset();">
        <div class="form-group">
          <label>Your name</label>
          <input class="form-control" type="text" required placeholder="Full name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input class="form-control" type="tel" required placeholder="01XXXXXXXXX">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea class="form-control" rows="4" required placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" class="btn-checkout" style="margin-top:0">Send Message</button>
      </form>
    </div>
  </div>
</main>

<footer class="site-footer" style="margin-top:48px">
  <div class="footer-bottom" style="border:none">© 2026 Amptek</div>
</footer>

<script src="js/app.js" defer></script>
</body>
</html>
