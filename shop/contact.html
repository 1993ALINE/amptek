<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Amptek Engineering</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <a href="index.html" data-en="← Back to store" data-bn="← স্টোরে ফিরে যান">← Back to store</a>
    <span>📞 <span data-company-phone></span></span>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Amp<span>tek</span> <small style="font-size:11px;font-weight:600;color:var(--text3)">Engineering</small></a>
    <div class="header-actions" style="margin-left:auto">
      <a href="cart.html" class="icon-btn" aria-label="Quote list">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" data-cart-count style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page-main">
  <h1 class="page-title">Contact <span data-company-name></span></h1>
  <p style="color:var(--text2);margin:-12px 0 28px;font-size:15px" data-company-slogan></p>

  <div class="contact-layout" style="display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:960px">
    <div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">📞</div>
        <div>
          <div class="ci-label">Phone</div>
          <div class="ci-value" data-company-phone></div>
        </div>
      </div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">✉️</div>
        <div>
          <div class="ci-label">Email</div>
          <div class="ci-value" data-company-email></div>
        </div>
      </div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">🌐</div>
        <div>
          <div class="ci-label">Website</div>
          <div class="ci-value" data-company-website></div>
        </div>
      </div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">📍</div>
        <div>
          <div class="ci-label">Address</div>
          <div class="ci-value" style="font-weight:500;line-height:1.5" data-company-address></div>
        </div>
      </div>
      <div class="ci-card" style="margin-bottom:14px">
        <div class="ci-icon">💬</div>
        <div>
          <div class="ci-label">WhatsApp</div>
          <div class="ci-value"><a href="https://wa.me/8801671113615" target="_blank" rel="noopener">Chat on WhatsApp</a></div>
        </div>
      </div>
      <div class="ci-card">
        <div class="ci-icon">📘</div>
        <div>
          <div class="ci-label">Facebook</div>
          <div class="ci-value"><a data-facebook-href target="_blank" rel="noopener">Amptek Engineering</a></div>
        </div>
      </div>
    </div>
    <div class="cf-box">
      <h2 class="cf-title" style="font-family:inherit;font-size:20px;font-weight:700;margin-bottom:8px">Request a Quote</h2>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px" data-company-tagline></p>
      <form id="contactForm" onsubmit="event.preventDefault(); alert('Thank you! Amptek will contact you at ' + AMPTEK.phoneDisplay + ' or ' + AMPTEK.email); this.reset();">
        <div class="form-group">
          <label>Your name</label>
          <input class="form-control" type="text" required placeholder="Full name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input class="form-control" type="tel" required placeholder="01XXXXXXXXX">
        </div>
        <div class="form-group">
          <label>Service needed</label>
          <select class="form-control">
            <option>Power — Switchgear, BBT, Transformers</option>
            <option>Fire Safety — NFPA, Hydrants, FM-200</option>
            <option>Mechanical — Boiler, HVAC, Tanks</option>
            <option>Industrial — Automation, PLC</option>
            <option>Safety — Lightning & Compliance</option>
          </select>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea class="form-control" rows="4" required placeholder="Project details…"></textarea>
        </div>
        <button type="submit" class="btn-checkout" style="margin-top:0">Send Enquiry</button>
      </form>
    </div>
  </div>
</main>

<footer class="site-footer" style="margin-top:48px">
  <div class="footer-bottom" style="border:none">© 2026 <span data-company-name></span> · <span data-company-slogan></span></div>
</footer>

<script src="js/company.js"></script>
<script src="js/i18n.js"></script>
<script src="js/products.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
